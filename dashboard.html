<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Too Many Tabs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="top-bar">
  <button id="darkModeBtn">🌙</button>
  </button>
</div>
    <h1>Too Many Tabs</h1>
</button>
    <div class="stats-container">

  <div class="stat-card">
    <h3 id="totalTabs">0</h3>
    <p>Total Tabs</p>
  </div>

  <div class="stat-card">
    <h3 id="pendingTabs">0</h3>
    <p>Pending</p>
  </div>

  <div class="stat-card">
    <h3 id="doneTabs">0</h3>
    <p>Completed</p>
  </div>

  <div class="stat-card">
    <h3 id="pinnedTabs">0</h3>
    <p>Pinned</p>
  </div>

</div>
    <p>Save links with the reason you opened them.</p>

    <h2>Saved Tabs</h2>
    <input
  type="text"
  id="searchInput"
  placeholder="Search tabs..."
/>
<select id="statusFilter">
  <option value="all">All Tabs</option>
  <option value="pending">Pending</option>
  <option value="done">Done</option>
</select>

<div class="backup-actions">
  <button id="exportBtn">Export Tabs</button>
  <input type="file" id="importFile" accept=".json">
</div>

</select>
    <h2>Overdue</h2>
    <div id="overdueList"></div>

    <h2>Due Today</h2>
    <div id="todayList"></div>

    <h2>Upcoming</h2>
    <div id="tabsList"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
